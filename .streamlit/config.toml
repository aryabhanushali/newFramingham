# Pin the theme so visitors see the Apple-Health-style dark surface regardless
# of their browser preference.
[theme]
base = "dark"
primaryColor = "#FF3B30"                # iOS system red
backgroundColor = "#000000"             # Health app surface
secondaryBackgroundColor = "#1C1C1E"    # card / sidebar background
textColor = "#FFFFFF"
font = "sans serif"

[browser]
gatherUsageStats = false
